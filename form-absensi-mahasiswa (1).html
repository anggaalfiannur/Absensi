<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Form Absensi Mahasiswa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    border: 1px solid #334155;
  }
  .top-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1e3a5f;
    border: 1px solid #1e40af55;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    color: #93c5fd;
    font-weight: 600;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

  .info-box {
    background: #0f172a;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
    border: 1px solid #334155;
  }
  .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .info-row:last-child { margin-bottom: 0; }
  .info-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .info-label { font-size: 11px; color: #64748b; }
  .info-val { font-size: 13px; font-weight: 600; color: #e2e8f0; }

  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 6px; font-weight: 500; }
  input {
    width: 100%;
    padding: 12px 14px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 15px;
    margin-bottom: 14px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px #3b82f620; }
  input::placeholder { color: #475569; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-submit:hover { background: #2563eb; }
  .btn-submit:active { transform: scale(0.98); }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

  .success-wrap {
    display: none;
    text-align: center;
    padding: 10px 0;
  }
  .check-circle {
    width: 72px; height: 72px;
    background: #14532d;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 16px;
    animation: popIn .4s ease;
  }
  @keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .success-title { font-size: 20px; font-weight: 700; color: #4ade80; margin-bottom: 6px; }
  .success-sub { font-size: 13px; color: #64748b; line-height: 1.6; }
  .success-detail { background: #0f172a; border-radius: 10px; padding: 12px 16px; margin-top: 14px; text-align: left; }
  .success-detail p { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  .success-detail span { color: #e2e8f0; font-weight: 600; }

  .error-msg { font-size: 12px; color: #f87171; margin-bottom: 10px; display: none; padding: 8px 12px; background: #450a0a; border-radius: 8px; }

  .loading-spinner {
    width: 20px; height: 20px;
    border: 2px solid #ffffff40;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .timer-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    color: #fbbf24;
    margin-top: 14px;
    font-weight: 600;
  }

  @media (max-width: 400px) {
    .card { padding: 20px 16px; border-radius: 16px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="top-badge"><div class="dot"></div> Sesi Absensi Aktif</div>

  <div id="form-wrap">
    <h1>📋 Form Absensi</h1>
    <p class="subtitle">Isi data diri Anda untuk mencatat kehadiran</p>

    <div class="info-box" id="sesi-info">
      <div class="info-row">
        <div class="info-icon" style="background:#1e3a5f">📚</div>
        <div>
          <div class="info-label">Mata Kuliah</div>
          <div class="info-val" id="disp-mk">Memuat...</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon" style="background:#1e3a5f">🎓</div>
        <div>
          <div class="info-label">Semester & Pertemuan</div>
          <div class="info-val" id="disp-sem">-</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon" style="background:#1e3a5f">📅</div>
        <div>
          <div class="info-label">Tanggal</div>
          <div class="info-val" id="disp-tgl">-</div>
        </div>
      </div>
    </div>

    <div>
      <label>NIM (Nomor Induk Mahasiswa)</label>
      <input type="text" id="inp-nim" placeholder="Contoh: 2024001001" maxlength="20" inputmode="numeric">
    </div>
    <div>
      <label>Nama Lengkap</label>
      <input type="text" id="inp-nama" placeholder="Nama sesuai KTM" maxlength="60">
    </div>
    <div>
      <label>Program Studi</label>
      <input type="text" id="inp-prodi" placeholder="Contoh: Teknik Informatika" maxlength="60">
    </div>

    <div class="error-msg" id="err-msg">⚠️ Pesan error</div>

    <button class="btn-submit" id="btn-kirim" onclick="kirimAbsensi()">
      <div class="loading-spinner" id="spinner"></div>
      <span id="btn-txt">✅ Kirim Absensi</span>
    </button>

    <div class="timer-badge" id="timer-badge" style="display:none">
      ⏰ Sisa waktu: <span id="countdown">--:--</span>
    </div>
  </div>

  <div class="success-wrap" id="success-wrap">
    <div class="check-circle">✅</div>
    <div class="success-title">Absensi Berhasil!</div>
    <p class="success-sub">Kehadiran Anda telah tercatat.<br>Terima kasih!</p>
    <div class="success-detail">
      <p>Mata Kuliah: <span id="s-mk">-</span></p>
      <p>Nama: <span id="s-nama">-</span></p>
      <p>NIM: <span id="s-nim">-</span></p>
      <p>Waktu: <span id="s-waktu">-</span></p>
    </div>
  </div>
</div>

<script>
  let sesiData = {};
  let timerSisa = null;
  let timerInt = null;

  function getParams() {
    const params = {};
    const raw = window.location.search.replace('?','');
    raw.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

  function init() {
    const p = getParams();

    // Coba baca dari URL params langsung
    if (p.mk) {
      sesiData = p;
    } else if (p.data) {
      // Jika di-encode sebagai JSON dalam param
      try { sesiData = JSON.parse(atob(p.data)); } catch(e) {}
    }

    document.getElementById('disp-mk').textContent = sesiData.mk || 'Tidak diketahui';
    document.getElementById('disp-sem').textContent =
      (sesiData.sem ? 'Semester ' + sesiData.sem : '') +
      (sesiData.prt ? ' · Pertemuan ke-' + sesiData.prt : '') +
      (sesiData.kls ? ' · Kelas ' + sesiData.kls : '');
    document.getElementById('disp-tgl').textContent = sesiData.tanggal || new Date().toLocaleDateString('id-ID');

    // Timer hitung mundur jika ada batas waktu
    if (sesiData.batas) {
      const batas = parseInt(sesiData.batas);
      const updateTimer = () => {
        const sisa = Math.max(0, Math.floor((batas - Date.now()) / 1000));
        if (sisa <= 0) {
          clearInterval(timerInt);
          document.getElementById('timer-badge').innerHTML = '⛔ Waktu absensi telah habis';
          document.getElementById('btn-kirim').disabled = true;
          return;
        }
        const m = Math.floor(sisa / 60), s = sisa % 60;
        document.getElementById('countdown').textContent = m + ':' + s.toString().padStart(2,'0');
        document.getElementById('timer-badge').style.display = 'flex';
      };
      timerInt = setInterval(updateTimer, 1000);
      updateTimer();
    }
  }

  async function kirimAbsensi() {
    const nim = document.getElementById('inp-nim').value.trim();
    const nama = document.getElementById('inp-nama').value.trim();
    const prodi = document.getElementById('inp-prodi').value.trim();
    const err = document.getElementById('err-msg');

    if (!nim || !nama) {
      err.textContent = '⚠️ NIM dan Nama wajib diisi!';
      err.style.display = 'block';
      return;
    }
    if (nim.length < 6) {
      err.textContent = '⚠️ NIM tidak valid (minimal 6 karakter)';
      err.style.display = 'block';
      return;
    }

    err.style.display = 'none';
    document.getElementById('btn-kirim').disabled = true;
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('btn-txt').textContent = 'Mengirim...';

    const now = new Date();
    const payload = {
      action: 'absen',
      nim, nama, prodi,
      semester: sesiData.sem || '-',
      mataKuliah: sesiData.mk || '-',
      pertemuan: sesiData.prt || '1',
      kelas: sesiData.kls || '-',
      token: sesiData.token || '',
      tanggal: sesiData.tanggal || now.toLocaleDateString('id-ID'),
      waktu: now.toLocaleTimeString('id-ID'),
      status: 'Hadir'
    };

    const gasUrl = sesiData.gasUrl || 'https://script.google.com/macros/s/AKfycbw5deJi-bRj-N7zOQl8_Q-yKGc2uCSI5EhJKIzyA89xTrr0Iv6TfzVIf2W4Z-kMjpSG/exec';

    try {
      // Gunakan encodeURIComponent manual agar spasi tetap %20, bukan +
      const qs = Object.entries(payload)
        .map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(String(v)))
        .join('&');
      const url = gasUrl + '?' + qs;
      await fetch(url, { mode: 'no-cors' });

      // Tampilkan sukses
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('success-wrap').style.display = 'block';
      document.getElementById('s-mk').textContent = sesiData.mk || '-';
      document.getElementById('s-nama').textContent = nama;
      document.getElementById('s-nim').textContent = nim;
      document.getElementById('s-waktu').textContent = now.toLocaleTimeString('id-ID') + ' · ' + now.toLocaleDateString('id-ID');

    } catch (e) {
      err.textContent = '❌ Gagal mengirim. Periksa koneksi internet Anda.';
      err.style.display = 'block';
      document.getElementById('btn-kirim').disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-txt').textContent = '✅ Kirim Absensi';
    }
  }

  // Enter key submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') kirimAbsensi();
  });

  init();
</script>
</body>
</html>
